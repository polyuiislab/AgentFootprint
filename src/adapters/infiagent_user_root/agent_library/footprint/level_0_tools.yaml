tools:
  file_read:
    level: 0
    type: tool_call_agent
    name: file_read
    description: 读取指定文本文件的内容。path 默认相对于当前 task 根目录，不要传绝对路径。支持读取隐藏目录，例如 '.skills/demo/SKILL.md'。单个文件传 ['main.tex']，多个文件传 ['sec1.md',
      'sec2.md']。默认返回带行号的 JSON 格式。警告：不要读取二进制文件（如 pdf、docx、图片等）。
    parameters:
      type: object
      properties:
        path:
          type: array
          items:
            type: string
          description: 文件相对路径数组，基于当前 workspace/task 根目录解析。示例：['main.tex']、['notes/summary.md']、['.skills/pptx/SKILL.md']。不要传绝对路径；只允许读取文本文件，不要读取二进制文件。
        start_line:
          type: integer
          description: 读取起始行号（从1开始），可选。多文件模式下应用于所有文件。
        end_line:
          type: integer
          description: 读取结束行号（包含），可选。多文件模式下应用于所有文件。
        encoding:
          type: string
          description: 文件编码，可选。不指定时自动检测。
        show_line_numbers:
          type: boolean
          default: true
          description: 是否显示行号。true 返回 JSON 格式（含行号），false 返回纯文本。默认 true。
      required:
      - path
  dir_list:
    level: 0
    type: tool_call_agent
    name: dir_list
    description: 列出指定目录的内容。path 默认相对于当前 workspace/task 根目录；不传时默认列出任务根目录。支持列出隐藏目录，例如 '.skills'。可以递归列出所有子目录和文件（自动排除 code_env
      目录）。
    parameters:
      type: object
      properties:
        path:
          type: string
          default: .
          description: 要列出的目录相对路径，相对于当前 workspace/task 根目录解析。示例：'.'、'sections'、'.skills'。不指定时列出任务根目录。
        recursive:
          type: boolean
          default: false
          description: 是否递归列出子目录，默认 false。
      required: []
  final_output:
    level: 0
    type: tool_call_agent
    name: final_output
    description: 智能体输出最终结果的工具。当智能体完成任务或需要终止执行时调用此工具。你的非工具调用输出不会停止智能体循环，你的非工具调用输出并不是最终输出，你必须通过这个工具结束执行任务！
    parameters:
      type: object
      properties:
        task_id:
          type: string
          description: 任务的唯一ID。
        status:
          type: string
          enum:
          - success
          - error
          description: 任务执行状态：'success' 表示成功完成，'error' 表示执行失败。
        output:
          type: string
          description: 成功或失败的说明。如果输出包含文件，必须提供文件的相对路径和描述（不要重复文件中已有的内容），并包含 judge agent 的反馈。
        error_information:
          type: string
          description: 错误信息，仅在 status 为 'error' 时必需。
      required:
      - task_id
      - status
      - output
  file_write:
    level: 0
    type: tool_call_agent
    name: file_write
    description: 向指定文本文件写入内容。path 默认相对于当前 workspace/task 根目录，不要传绝对路径。示例：'notes/result.md'、'code_run/main.py'、'.skills/local_note.md'。如果文件不存在会自动创建；如果存在可以选择覆盖或追加，也支持替换指定行。维护
      reference.bib 时优先使用 reference_add/reference_delete。
    parameters:
      type: object
      properties:
        path:
          type: string
          description: 文件的相对路径，例如 'src/main.py'、'notes/output.md'、'.skills/demo/README.md'，相对于当前 workspace/task 根目录解析。不要传绝对路径。写入前建议先用
            dir_list 检查是否已有同名文件。
        content:
          type: string
          description: 要写入的文本内容。
        mode:
          type: string
          enum:
          - write
          - append
          default: write
          description: 写入模式。'write' 覆盖整个文件，'append' 追加到文件末尾。
        start_line:
          type: integer
          description: 行替换模式 - 起始行号（从1开始），可选。
        end_line:
          type: integer
          description: 行替换模式 - 结束行号，可选。
      required:
      - path
      - content

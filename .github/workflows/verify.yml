name: verify
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install zstandard fastcdc numpy
      - name: meter calibration
        run: |
          set -o pipefail
          python src/meter_calibration.py 2>&1 | tee /tmp/o.log || { echo "::error title=calibration::$(tail -c 600 /tmp/o.log | tr '\n' '¦')"; exit 1; }
      - name: R scorer construct validation
        run: |
          set -o pipefail
          python src/r_scorer_validation.py 2>&1 | tee /tmp/o.log || { echo "::error title=rvalidation::$(tail -c 600 /tmp/o.log | tr '\n' '¦')"; exit 1; }
      - name: regenerate published tables from archived data
        run: |
          set -o pipefail
          python src/verify_expected.py 2>&1 | tee /tmp/o.log || { echo "::error title=verify_expected::$(tail -c 600 /tmp/o.log | tr '\n' '¦')"; exit 1; }

  fixed-trace-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install zstandard fastcdc "openai-agents==0.18.0"
      - name: offline fixed-trace (mock endpoint, zero API)
        env:
          FIXED_TRACE_FWS: openai_agents
        run: |
          set -o pipefail
          export FOOTPRINT_PY_OPENAI_AGENTS=$(which python)
          python src/fixed_trace.py 2>&1 | tee /tmp/o.log || { echo "::error title=fixedtrace::$(tail -c 600 /tmp/o.log | tr '\n' '¦')"; exit 1; }
          python src/ci_smoke_check.py openai_agents 2>&1 | tee /tmp/s.log || { echo "::error title=smokecheck::$(tail -c 600 /tmp/s.log | tr '\n' '¦')"; exit 1; }

  image:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/polyuiislab/agentfootprint:v1.0
            ghcr.io/polyuiislab/agentfootprint:latest
